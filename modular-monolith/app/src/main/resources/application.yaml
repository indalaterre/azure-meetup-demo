# =============================================================================
# Modular Monolith - E-Commerce Application Configuration
# =============================================================================

quarkus:
  application:
    name: modular-monolith

  datasource:
    db-kind: postgresql
    devservices:
      enabled: true

  hibernate-orm:
    database:
      generation: drop-and-create
    log:
      sql: true

  http:
    port: 10990

  banner:
    enabled: true

  index-dependency:
    azure-json:
      group-id: com.azure
      artifact-id: azure-json

  container-image:
    builder: jib
    registry: acrglobalazurepuglia.azurecr.io
    group: modular-monolith
    name: modular-monolith
    tag: latest
    push: true

"%native":
  quarkus:
    container-image:
      tag: native

"%jvm":
  quarkus:
    container-image:
      tag: jvm

"%test-local":
  quarkus:
    datasource:
      username: demo
      password: demo
      jdbc:
        url: jdbc:postgresql://localhost:6000/modularmonolith
